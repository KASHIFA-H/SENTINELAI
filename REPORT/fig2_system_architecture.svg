<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" width="780" height="500" font-family="Arial, sans-serif">
  <rect width="780" height="500" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="390" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Fig. 2 — SentinelShield AI System Architecture</text>
  <defs>
    <marker id="b1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#1a3a5c"/></marker>
    <marker id="b2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#c0392b"/></marker>
    <marker id="b3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#2d6a4f"/></marker>
  </defs>

  <!-- OT Files Layer -->
  <rect x="20" y="45" width="740" height="55" rx="8" fill="#e8f4fd" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="390" y="63" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a5c">OT SANDBOX — Industrial Data Files</text>
  <rect x="35" y="70" width="90" height="22" rx="4" fill="#1a3a5c"/>
  <text x="80" y="85" text-anchor="middle" font-size="9" fill="white">PLC Logic</text>
  <rect x="135" y="70" width="90" height="22" rx="4" fill="#1a3a5c"/>
  <text x="180" y="85" text-anchor="middle" font-size="9" fill="white">SCADA Data</text>
  <rect x="235" y="70" width="90" height="22" rx="4" fill="#1a3a5c"/>
  <text x="280" y="85" text-anchor="middle" font-size="9" fill="white">HMI Config</text>
  <rect x="335" y="70" width="90" height="22" rx="4" fill="#1a3a5c"/>
  <text x="380" y="85" text-anchor="middle" font-size="9" fill="white">Batch Recipe</text>
  <rect x="435" y="70" width="90" height="22" rx="4" fill="#1a3a5c"/>
  <text x="480" y="85" text-anchor="middle" font-size="9" fill="white">Asset Register</text>
  <rect x="535" y="70" width="80" height="22" rx="4" fill="#e8a020"/>
  <text x="575" y="85" text-anchor="middle" font-size="9" fill="white">🪤 Canary</text>
  <rect x="625" y="70" width="80" height="22" rx="4" fill="#c0392b"/>
  <text x="665" y="85" text-anchor="middle" font-size="9" fill="white">🍯 Honeypot</text>

  <!-- Arrow down -->
  <line x1="390" y1="100" x2="390" y2="120" stroke="#1a3a5c" stroke-width="2" marker-end="url(#b1)"/>

  <!-- Watchdog -->
  <rect x="250" y="120" width="280" height="38" rx="8" fill="#1e4976"/>
  <text x="390" y="136" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Python Watchdog Monitor</text>
  <text x="390" y="151" text-anchor="middle" font-size="9" fill="#00c8e0">Real-time file system event capture — CREATE / MODIFY / DELETE / RENAME</text>

  <!-- Arrows to engines -->
  <line x1="310" y1="158" x2="130" y2="198" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="350" y1="158" x2="280" y2="198" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="390" y1="158" x2="390" y2="198" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="430" y1="158" x2="500" y2="198" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="470" y1="158" x2="640" y2="198" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Detection Engines -->
  <rect x="30" y="198" width="160" height="60" rx="6" fill="#fff8e1" stroke="#b7770d" stroke-width="1.5"/>
  <text x="110" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#b7770d">Behavioral Engine</text>
  <text x="110" y="231" text-anchor="middle" font-size="9" fill="#3d3020">Rapid modification</text>
  <text x="110" y="245" text-anchor="middle" font-size="9" fill="#3d3020">4+ writes / 5 sec → +30</text>

  <rect x="210" y="198" width="160" height="60" rx="6" fill="#fff8e1" stroke="#b7770d" stroke-width="1.5"/>
  <text x="290" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#b7770d">Entropy Engine</text>
  <text x="290" y="231" text-anchor="middle" font-size="9" fill="#3d3020">Shannon H &gt; 7.0 bits</text>
  <text x="290" y="245" text-anchor="middle" font-size="9" fill="#3d3020">Encryption detected → +40</text>

  <rect x="320" y="198" width="140" height="60" rx="6" fill="#fde8e6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="390" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">Canary Engine</text>
  <text x="390" y="231" text-anchor="middle" font-size="9" fill="#3d3020">Trap file access</text>
  <text x="390" y="245" text-anchor="middle" font-size="9" fill="#3d3020">Instant alert → +100</text>

  <rect x="475" y="198" width="140" height="60" rx="6" fill="#fde8e6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="545" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">Exfil Engine</text>
  <text x="545" y="231" text-anchor="middle" font-size="9" fill="#3d3020">Honeypot access</text>
  <text x="545" y="245" text-anchor="middle" font-size="9" fill="#3d3020">Bulk read anomaly → +100</text>

  <rect x="630" y="198" width="130" height="60" rx="6" fill="#d4edda" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="695" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d6a4f">Integrity Engine</text>
  <text x="695" y="231" text-anchor="middle" font-size="9" fill="#3d3020">SHA-256 hash</text>
  <text x="695" y="245" text-anchor="middle" font-size="9" fill="#3d3020">Quarantine verify</text>

  <!-- Arrows to scorer -->
  <line x1="110" y1="258" x2="340" y2="298" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="290" y1="258" x2="365" y2="298" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="390" y1="258" x2="390" y2="298" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="545" y1="258" x2="415" y2="298" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="695" y1="258" x2="440" y2="298" stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Threat Scorer -->
  <rect x="250" y="298" width="280" height="38" rx="8" fill="#c0392b"/>
  <text x="390" y="314" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Threat Scorer (0–200 pts)</text>
  <text x="390" y="329" text-anchor="middle" font-size="9" fill="white">Threshold 70 pts → Automated Response Triggered</text>

  <!-- Two arrows -->
  <line x1="320" y1="336" x2="200" y2="368" stroke="#c0392b" stroke-width="2" marker-end="url(#b2)"/>
  <line x1="460" y1="336" x2="560" y2="368" stroke="#2d6a4f" stroke-width="2" marker-end="url(#b3)"/>

  <!-- Response -->
  <rect x="60" y="368" width="280" height="70" rx="8" fill="#fde8e6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="200" y="386" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Auto Response + Recovery</text>
  <text x="200" y="402" text-anchor="middle" font-size="9" fill="#3d3020">Kill process → Lock sandbox → Email admin</text>
  <text x="200" y="416" text-anchor="middle" font-size="9" fill="#3d3020">Restore snapshot → Reset score → Redeploy canary</text>
  <text x="200" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="#c0392b">RTO &lt; 30 seconds</text>

  <!-- Dashboard -->
  <rect x="440" y="368" width="300" height="70" rx="8" fill="#d4edda" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="590" y="386" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d6a4f">React Dashboard + AI Chatbot</text>
  <text x="590" y="402" text-anchor="middle" font-size="9" fill="#3d3020">Live threat score · Entropy graph · OT Asset Status</text>
  <text x="590" y="416" text-anchor="middle" font-size="9" fill="#3d3020">ML Prediction · Backup Snapshots · System Logs</text>
  <text x="590" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d6a4f">FastAPI Backend · Supabase DB</text>

  <text x="390" y="490" text-anchor="middle" font-size="10" font-style="italic" fill="#6b5a45">Fig. 2: SentinelShield AI layered system architecture — from OT file monitoring to automated recovery</text>
</svg>
