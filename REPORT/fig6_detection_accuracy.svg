<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380" font-family="Arial, sans-serif">
  <rect width="700" height="380" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Fig. 6 — Detection Accuracy by Engine Layer</text>

  <!-- Axes -->
  <line x1="80" y1="290" x2="660" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="50" x2="80" y2="290" stroke="#333" stroke-width="1.5"/>

  <text x="370" y="315" text-anchor="middle" font-size="11" fill="#333">Detection Engine</text>
  <text x="20" y="180" text-anchor="middle" font-size="11" fill="#333" transform="rotate(-90,20,180)">Detection Rate (%)</text>

  <!-- Y labels and grid -->
  <text x="70" y="294" text-anchor="end" font-size="9" fill="#333">0</text>
  <text x="70" y="254" text-anchor="end" font-size="9" fill="#333">20</text>
  <text x="70" y="214" text-anchor="end" font-size="9" fill="#333">40</text>
  <text x="70" y="174" text-anchor="end" font-size="9" fill="#333">60</text>
  <text x="70" y="134" text-anchor="end" font-size="9" fill="#333">80</text>
  <text x="70" y="94" text-anchor="end" font-size="9" fill="#333">100</text>
  <line x1="80" y1="254" x2="660" y2="254" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="214" x2="660" y2="214" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="174" x2="660" y2="174" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="134" x2="660" y2="134" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="94" x2="660" y2="94" stroke="#f0f0f0" stroke-width="1"/>

  <!-- scale: 100% = 240px, 1% = 2.4px, bar top = 290 - pct*2.4 -->

  <!-- Behavioral: 87% → top=81.2 → y=208.8 h=81.2 -->
  <rect x="110" y="81" width="70" height="209" fill="#b7770d" opacity="0.85" rx="3"/>
  <text x="145" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#b7770d">87%</text>
  <text x="145" y="305" text-anchor="middle" font-size="9" fill="#333">Behavioral</text>

  <!-- Entropy: 92% → h=220.8 -->
  <rect x="220" y="69" width="70" height="221" fill="#b7770d" opacity="0.85" rx="3"/>
  <text x="255" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="#b7770d">92%</text>
  <text x="255" y="305" text-anchor="middle" font-size="9" fill="#333">Entropy</text>

  <!-- Canary: 99.8% → h=239.5 -->
  <rect x="330" y="51" width="70" height="239" fill="#c0392b" opacity="0.85" rx="3"/>
  <text x="365" y="46" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">99.8%</text>
  <text x="365" y="305" text-anchor="middle" font-size="9" fill="#333">Canary</text>

  <!-- Honeypot: 99.9% → h=239.8 -->
  <rect x="440" y="50" width="70" height="240" fill="#c0392b" opacity="0.85" rx="3"/>
  <text x="475" y="45" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">99.9%</text>
  <text x="475" y="305" text-anchor="middle" font-size="9" fill="#333">Honeypot</text>

  <!-- Combined: 98% → h=235.2 -->
  <rect x="550" y="58" width="70" height="232" fill="#1a3a5c" opacity="0.9" rx="3"/>
  <text x="585" y="53" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a5c">98%</text>
  <text x="585" y="305" text-anchor="middle" font-size="9" fill="#333">Combined</text>

  <!-- Legend -->
  <rect x="100" y="330" width="14" height="12" fill="#b7770d" opacity="0.85"/>
  <text x="118" y="341" font-size="10" fill="#333">Behavioral / Entropy</text>
  <rect x="280" y="330" width="14" height="12" fill="#c0392b" opacity="0.85"/>
  <text x="298" y="341" font-size="10" fill="#333">Trap-based (Canary / Honeypot)</text>
  <rect x="510" y="330" width="14" height="12" fill="#1a3a5c" opacity="0.9"/>
  <text x="528" y="341" font-size="10" fill="#333">Combined system</text>

  <text x="350" y="368" text-anchor="middle" font-size="10" font-style="italic" fill="#6b5a45">Fig. 6: Detection accuracy per engine — canary and honeypot traps achieve near-perfect detection with zero false positives</text>
</svg>
