<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380" font-family="Arial, sans-serif">
  <rect width="700" height="380" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Fig. 5 — System Performance Evaluation</text>

  <!-- Axes -->
  <line x1="200" y1="290" x2="660" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="200" y1="50" x2="200" y2="290" stroke="#333" stroke-width="1.5"/>

  <!-- X axis label -->
  <text x="430" y="310" text-anchor="middle" font-size="11" fill="#333">Performance Metric</text>
  <!-- Y axis label -->
  <text x="20" y="180" text-anchor="middle" font-size="11" fill="#333" transform="rotate(-90,20,180)">Time (seconds) / Score (%)</text>

  <!-- Y grid and labels -->
  <text x="190" y="294" text-anchor="end" font-size="9" fill="#333">0</text>
  <text x="190" y="244" text-anchor="end" font-size="9" fill="#333">20</text>
  <text x="190" y="194" text-anchor="end" font-size="9" fill="#333">40</text>
  <text x="190" y="144" text-anchor="end" font-size="9" fill="#333">60</text>
  <text x="190" y="94" text-anchor="end" font-size="9" fill="#333">80</text>
  <text x="190" y="60" text-anchor="end" font-size="9" fill="#333">100</text>
  <line x1="200" y1="244" x2="660" y2="244" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="200" y1="194" x2="660" y2="194" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="200" y1="144" x2="660" y2="144" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="200" y1="94" x2="660" y2="94" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Bar data: scale 100 = 230px height, so 1 unit = 2.3px, bar top = 290 - value*2.3 -->
  <!-- Metrics: Detection(2.4s→5.5%), Containment(2.7s→6.2%), Recovery(17s→39%), Email(8s→18.4%), Accuracy(98%→225.4px), FalsePos(2%→4.6px) -->

  <!-- Bar 1: Detection Time — Target 5s, Achieved 2.4s -->
  <rect x="220" y="277" width="35" height="13" fill="#c0392b" opacity="0.4"/>
  <text x="237" y="272" text-anchor="middle" font-size="8" fill="#c0392b">5s</text>
  <rect x="258" y="284" width="35" height="6" fill="#2d6a4f"/>
  <text x="275" y="280" text-anchor="middle" font-size="8" fill="#2d6a4f">2.4s</text>
  <text x="258" y="305" text-anchor="middle" font-size="8" fill="#333" transform="rotate(-30,258,305)">Detection</text>

  <!-- Bar 2: Containment — Target 10s, Achieved 2.7s -->
  <rect x="310" y="267" width="35" height="23" fill="#c0392b" opacity="0.4"/>
  <text x="327" y="262" text-anchor="middle" font-size="8" fill="#c0392b">10s</text>
  <rect x="348" y="284" width="35" height="6" fill="#2d6a4f"/>
  <text x="365" y="280" text-anchor="middle" font-size="8" fill="#2d6a4f">2.7s</text>
  <text x="348" y="305" text-anchor="middle" font-size="8" fill="#333" transform="rotate(-30,348,305)">Containment</text>

  <!-- Bar 3: Recovery RTO — Target 60s (capped), Achieved 17s -->
  <rect x="400" y="152" width="35" height="138" fill="#c0392b" opacity="0.4"/>
  <text x="417" y="148" text-anchor="middle" font-size="8" fill="#c0392b">60s</text>
  <rect x="438" y="251" width="35" height="39" fill="#2d6a4f"/>
  <text x="455" y="247" text-anchor="middle" font-size="8" fill="#2d6a4f">17s</text>
  <text x="438" y="305" text-anchor="middle" font-size="8" fill="#333" transform="rotate(-30,438,305)">Recovery RTO</text>

  <!-- Bar 4: Email Alert — Target 30s, Achieved 8s -->
  <rect x="490" y="221" width="35" height="69" fill="#c0392b" opacity="0.4"/>
  <text x="507" y="217" text-anchor="middle" font-size="8" fill="#c0392b">30s</text>
  <rect x="528" y="272" width="35" height="18" fill="#2d6a4f"/>
  <text x="545" y="268" text-anchor="middle" font-size="8" fill="#2d6a4f">8s</text>
  <text x="528" y="305" text-anchor="middle" font-size="8" fill="#333" transform="rotate(-30,528,305)">Email Alert</text>

  <!-- Bar 5: Detection Accuracy — Target 95%, Achieved 98% -->
  <rect x="580" y="72" width="35" height="218" fill="#c0392b" opacity="0.4"/>
  <text x="597" y="68" text-anchor="middle" font-size="8" fill="#c0392b">95%</text>
  <rect x="618" y="65" width="35" height="225" fill="#2d6a4f"/>
  <text x="635" y="61" text-anchor="middle" font-size="8" fill="#2d6a4f">98%</text>
  <text x="618" y="305" text-anchor="middle" font-size="8" fill="#333" transform="rotate(-30,618,305)">Accuracy</text>

  <!-- Legend -->
  <rect x="220" y="330" width="14" height="12" fill="#c0392b" opacity="0.4"/>
  <text x="238" y="341" font-size="10" fill="#333">Target / Benchmark</text>
  <rect x="380" y="330" width="14" height="12" fill="#2d6a4f"/>
  <text x="398" y="341" font-size="10" fill="#333">SentinelShield AI Achieved</text>

  <text x="350" y="368" text-anchor="middle" font-size="10" font-style="italic" fill="#6b5a45">Fig. 5: Performance evaluation — SentinelShield AI achieves targets across all metrics, with 17s RTO vs 60s target</text>
</svg>
